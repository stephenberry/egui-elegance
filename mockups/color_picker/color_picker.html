<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>ColorPicker (Slate)</title>
  <style>
    html, body { margin: 0; padding: 0; background: #0f172a; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Ubuntu, sans-serif;
      color: #e2e8f0;
    }

    .stack {
      display: flex;
      flex-direction: column;
      gap: 36px;
      width: 780px;
    }

    .caption {
      font-size: 12px;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 14px;
    }

    .row { display: flex; align-items: flex-start; gap: 22px; flex-wrap: wrap; }

    /* --- Trigger: a color swatch button showing current color and hex. --- */
    .trigger {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 5px 10px 5px 5px;
      background: #0b1120;
      border: 1px solid #334155;
      border-radius: 7px;
      cursor: pointer;
      font-family: inherit;
      font-size: 13px;
      color: #e2e8f0;
    }
    .trigger:hover { border-color: #475569; }
    .trigger .swatch {
      width: 22px;
      height: 22px;
      border-radius: 4px;
      box-shadow: inset 0 0 0 1px rgba(15, 23, 42, 0.4);
      background-image:
        linear-gradient(45deg, #1e293b 25%, transparent 25%),
        linear-gradient(-45deg, #1e293b 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, #1e293b 75%),
        linear-gradient(-45deg, transparent 75%, #1e293b 75%);
      background-size: 8px 8px;
      background-position: 0 0, 0 4px, 4px -4px, -4px 0;
    }
    .trigger .swatch .layer {
      display: block;
      width: 100%;
      height: 100%;
      border-radius: 4px;
    }
    .trigger .hex {
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 12.5px;
      color: #e2e8f0;
      font-variant-numeric: tabular-nums;
      text-transform: uppercase;
      letter-spacing: 0.02em;
    }

    /* --- Popover panel: shown as-if open --- */
    .popover {
      width: 248px;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 10px;
      padding: 14px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.35);
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .popover .label {
      font-size: 11px;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: -4px;
    }

    /* --- Palette grid (curated) --- */
    .palette {
      display: grid;
      grid-template-columns: repeat(10, 1fr);
      gap: 5px;
    }
    .swatch-btn {
      aspect-ratio: 1 / 1;
      border-radius: 4px;
      cursor: pointer;
      border: 1px solid rgba(15, 23, 42, 0.5);
      box-sizing: border-box;
      transition: transform 80ms;
    }
    .swatch-btn:hover { transform: scale(1.12); border-color: rgba(226, 232, 240, 0.4); }
    .swatch-btn.selected {
      box-shadow: 0 0 0 2px #38bdf8, 0 0 0 4px #0f172a;
    }

    /* --- Recents row --- */
    .recents {
      display: grid;
      grid-template-columns: repeat(10, 1fr);
      gap: 5px;
    }
    .recents .empty {
      aspect-ratio: 1 / 1;
      border-radius: 4px;
      background: #0b1120;
      border: 1px dashed #334155;
    }

    /* --- Alpha slider --- */
    .alpha {
      height: 14px;
      border-radius: 999px;
      position: relative;
      background-image:
        linear-gradient(45deg, #1e293b 25%, transparent 25%),
        linear-gradient(-45deg, #1e293b 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, #1e293b 75%),
        linear-gradient(-45deg, transparent 75%, #1e293b 75%);
      background-size: 8px 8px;
      background-position: 0 0, 0 4px, 4px -4px, -4px 0;
      overflow: visible;
    }
    .alpha .track {
      position: absolute;
      inset: 0;
      border-radius: 999px;
      background: linear-gradient(to right, rgba(56, 189, 248, 0), rgba(56, 189, 248, 1));
    }
    .alpha .thumb {
      position: absolute;
      top: 50%;
      width: 14px;
      height: 14px;
      border-radius: 999px;
      background: #e2e8f0;
      box-shadow: 0 0 0 2px #1e293b, 0 1px 2px rgba(0, 0, 0, 0.6);
      transform: translate(-50%, -50%);
    }

    /* --- Hex input --- */
    .hexinput {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .hexinput .preview {
      width: 28px;
      height: 28px;
      border-radius: 5px;
      background-image:
        linear-gradient(45deg, #1e293b 25%, transparent 25%),
        linear-gradient(-45deg, #1e293b 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, #1e293b 75%),
        linear-gradient(-45deg, transparent 75%, #1e293b 75%);
      background-size: 8px 8px;
      background-position: 0 0, 0 4px, 4px -4px, -4px 0;
      flex: none;
    }
    .hexinput .preview .inner {
      width: 100%;
      height: 100%;
      border-radius: 5px;
      box-shadow: inset 0 0 0 1px rgba(15,23,42,0.4);
    }
    .hexinput input {
      flex: 1;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 13px;
      background: #0b1120;
      color: #e2e8f0;
      border: 1px solid #334155;
      border-radius: 6px;
      padding: 6px 10px;
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }
    .hexinput input:focus {
      outline: none;
      border-color: #38bdf8;
      box-shadow: 0 0 0 2px rgba(56, 189, 248, 0.20);
    }

    /* --- Full picker (saturation + hue) --- */
    .pick {
      width: 248px;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 10px;
      padding: 14px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.35);
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .sat {
      position: relative;
      height: 150px;
      border-radius: 6px;
      background:
        linear-gradient(to top, #000, rgba(0,0,0,0)),
        linear-gradient(to right, #ffffff, rgba(56,189,248,1));
    }
    .sat .reticle {
      position: absolute;
      left: 72%;
      top: 38%;
      width: 12px;
      height: 12px;
      border-radius: 999px;
      transform: translate(-50%, -50%);
      border: 2px solid #fff;
      box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.6);
    }
    .hue {
      height: 12px;
      border-radius: 999px;
      position: relative;
      background: linear-gradient(to right,
        #f87171 0%,
        #fbbf24 17%,
        #4ade80 33%,
        #22d3ee 50%,
        #38bdf8 67%,
        #c084fc 83%,
        #f87171 100%);
    }
    .hue .thumb {
      position: absolute;
      top: 50%;
      left: 67%;
      width: 14px;
      height: 14px;
      border-radius: 999px;
      background: #38bdf8;
      box-shadow: 0 0 0 2px #fff, 0 0 0 3px rgba(0,0,0,0.4);
      transform: translate(-50%, -50%);
    }

    /* Form-like row with label. */
    .field {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 10px;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }
    .field .meta .name { font-size: 13.5px; color: #e2e8f0; font-weight: 500; }
    .field .meta .hint { font-size: 12.5px; color: #94a3b8; margin-top: 2px; }
  </style>
</head>
<body>
  <div class="stack">

    <!-- Trigger in a form row. -->
    <div>
      <div class="caption">Trigger — current color + hex, opens a popover</div>
      <div class="field">
        <div class="meta">
          <div class="name">Brand accent</div>
          <div class="hint">Used for focus rings and primary buttons.</div>
        </div>
        <button class="trigger">
          <span class="swatch"><span class="layer" style="background: #38bdf8;"></span></span>
          <span class="hex">#38BDF8</span>
        </button>
      </div>
    </div>

    <!-- Popover: curated swatch palette + recents + hex input -->
    <div>
      <div class="caption">Popover — curated palette (open state)</div>
      <div class="row">
        <div class="popover">
          <div class="label">Theme palette</div>
          <div class="palette">
            <button class="swatch-btn" style="background:#e2e8f0" title="Text"></button>
            <button class="swatch-btn" style="background:#94a3b8"></button>
            <button class="swatch-btn" style="background:#64748b"></button>
            <button class="swatch-btn" style="background:#475569"></button>
            <button class="swatch-btn" style="background:#334155"></button>
            <button class="swatch-btn" style="background:#1e293b"></button>
            <button class="swatch-btn" style="background:#0f172a"></button>
            <button class="swatch-btn" style="background:#0b1120"></button>
            <button class="swatch-btn" style="background:#111a2e"></button>
            <button class="swatch-btn" style="background:#182438"></button>

            <button class="swatch-btn selected" style="background:#38bdf8" title="Sky"></button>
            <button class="swatch-btn" style="background:#0ea5e9"></button>
            <button class="swatch-btn" style="background:#2563eb"></button>
            <button class="swatch-btn" style="background:#6366f1"></button>
            <button class="swatch-btn" style="background:#c084fc"></button>
            <button class="swatch-btn" style="background:#a855f7"></button>
            <button class="swatch-btn" style="background:#f472b6"></button>
            <button class="swatch-btn" style="background:#fb7185"></button>
            <button class="swatch-btn" style="background:#f87171"></button>
            <button class="swatch-btn" style="background:#ef4444"></button>

            <button class="swatch-btn" style="background:#f59e0b"></button>
            <button class="swatch-btn" style="background:#fbbf24"></button>
            <button class="swatch-btn" style="background:#facc15"></button>
            <button class="swatch-btn" style="background:#d97706"></button>
            <button class="swatch-btn" style="background:#a3e635"></button>
            <button class="swatch-btn" style="background:#86efac"></button>
            <button class="swatch-btn" style="background:#4ade80"></button>
            <button class="swatch-btn" style="background:#22c55e"></button>
            <button class="swatch-btn" style="background:#14b8a6"></button>
            <button class="swatch-btn" style="background:#22d3ee"></button>
          </div>

          <div class="label" style="margin-top:4px;">Recent</div>
          <div class="recents">
            <button class="swatch-btn" style="background:#4ade80"></button>
            <button class="swatch-btn" style="background:#fbbf24"></button>
            <button class="swatch-btn" style="background:#f87171"></button>
            <button class="swatch-btn" style="background:#c084fc"></button>
            <span class="empty"></span>
            <span class="empty"></span>
            <span class="empty"></span>
            <span class="empty"></span>
            <span class="empty"></span>
            <span class="empty"></span>
          </div>

          <div class="label" style="margin-top:4px;">Alpha</div>
          <div class="alpha">
            <div class="track"></div>
            <div class="thumb" style="left: 100%;"></div>
          </div>

          <div class="hexinput">
            <div class="preview"><div class="inner" style="background:#38bdf8"></div></div>
            <input type="text" value="#38BDF8" aria-label="Hex code"/>
          </div>
        </div>

        <!-- Full HSB picker next to the palette variant for comparison. -->
        <div class="pick">
          <div class="sat"><div class="reticle"></div></div>
          <div class="hue"><div class="thumb"></div></div>
          <div class="alpha">
            <div class="track"></div>
            <div class="thumb" style="left: 85%;"></div>
          </div>
          <div class="hexinput">
            <div class="preview"><div class="inner" style="background: rgba(56,189,248,0.85)"></div></div>
            <input type="text" value="#38BDF8 · 85%" aria-label="Hex code"/>
          </div>
        </div>
      </div>
    </div>

    <!-- Inline swatch array shown in a form field (no popover — live grid). -->
    <div>
      <div class="caption">Inline — tight swatch row for quick picks</div>
      <div class="field">
        <div class="meta">
          <div class="name">Status color</div>
          <div class="hint">Applied to the incident badge.</div>
        </div>
        <div style="display: inline-flex; gap: 6px; align-items: center;">
          <button class="swatch-btn" style="width:24px; height:24px; background:#4ade80"></button>
          <button class="swatch-btn" style="width:24px; height:24px; background:#fbbf24"></button>
          <button class="swatch-btn selected" style="width:24px; height:24px; background:#f87171"></button>
          <button class="swatch-btn" style="width:24px; height:24px; background:#94a3b8"></button>
          <button class="swatch-btn" style="width:24px; height:24px; background:#c084fc"></button>
        </div>
      </div>
    </div>

  </div>
</body>
</html>
