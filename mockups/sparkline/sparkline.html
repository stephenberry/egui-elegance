<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Sparkline (Slate)</title>
  <style>
    html, body { margin: 0; padding: 0; background: #0f172a; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Ubuntu, sans-serif;
      color: #e2e8f0;
    }

    .stack {
      display: flex;
      flex-direction: column;
      gap: 40px;
      width: 780px;
    }

    .caption {
      font-size: 12px;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 14px;
    }

    /* --- Stat tile grid (sparkline as hero element) --- */
    .tiles {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
    }
    .tile {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 10px;
      padding: 14px 16px;
    }
    .tile .label {
      font-size: 12px;
      color: #94a3b8;
      letter-spacing: 0.02em;
    }
    .tile .val {
      display: flex;
      align-items: baseline;
      gap: 8px;
      margin: 4px 0 10px;
    }
    .tile .val .num {
      font-size: 26px;
      font-weight: 600;
      color: #e2e8f0;
      font-variant-numeric: tabular-nums;
    }
    .tile .val .unit {
      color: #64748b;
      font-size: 13px;
    }
    .tile .delta {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      padding: 1px 6px;
      font-size: 11.5px;
      font-weight: 600;
      border-radius: 99px;
      font-variant-numeric: tabular-nums;
    }
    .delta.up   { background: rgba(74, 222, 128, 0.14); color: #4ade80; }
    .delta.down { background: rgba(248, 113, 113, 0.14); color: #f87171; }
    .delta.flat { background: rgba(148, 163, 184, 0.14); color: #94a3b8; }

    /* --- Shared chart sizing --- */
    svg.spark {
      display: block;
      width: 100%;
      height: 36px;
    }
    svg.spark.tall { height: 48px; }

    /* --- Inline variants row --- */
    .row {
      display: flex;
      align-items: center;
      gap: 28px;
      flex-wrap: wrap;
    }
    .inline {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      color: #e2e8f0;
    }
    .inline svg.spark {
      width: 88px;
      height: 22px;
    }
    .inline .label { color: #94a3b8; font-size: 13px; }
    .inline .num { font-variant-numeric: tabular-nums; font-weight: 600; }

    /* --- In a row inside a table (similar to DataTable) --- */
    .panel {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 10px;
      overflow: hidden;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13.5px;
    }
    thead th {
      text-align: left;
      color: #94a3b8;
      font-weight: 600;
      font-size: 12.5px;
      padding: 10px 14px;
      background: #182438;
      border-bottom: 1px solid #334155;
    }
    th.num, td.num { text-align: right; font-variant-numeric: tabular-nums; }
    td { padding: 10px 14px; color: #e2e8f0; border-bottom: 1px solid #263445; }
    tr:last-child td { border-bottom: none; }
    td svg.spark { width: 140px; height: 22px; }
  </style>
</head>
<body>
  <div class="stack">

    <!-- Hero tiles: big number + sparkline underneath. -->
    <div>
      <div class="caption">Inside a stat tile</div>
      <div class="tiles">

        <div class="tile">
          <div class="label">Requests / sec</div>
          <div class="val"><span class="num">3.2k</span><span class="delta up">↗ 12%</span></div>
          <svg class="spark tall" viewBox="0 0 120 48" preserveAspectRatio="none">
            <defs>
              <linearGradient id="fill-green" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stop-color="#4ade80" stop-opacity="0.35"/>
                <stop offset="100%" stop-color="#4ade80" stop-opacity="0"/>
              </linearGradient>
            </defs>
            <path d="M0,36 L10,34 L20,38 L30,30 L40,32 L50,26 L60,28 L70,22 L80,24 L90,18 L100,14 L110,10 L120,6 L120,48 L0,48 Z"
                  fill="url(#fill-green)"/>
            <path d="M0,36 L10,34 L20,38 L30,30 L40,32 L50,26 L60,28 L70,22 L80,24 L90,18 L100,14 L110,10 L120,6"
                  fill="none" stroke="#4ade80" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/>
            <circle cx="120" cy="6" r="2.2" fill="#4ade80"/>
          </svg>
        </div>

        <div class="tile">
          <div class="label">Error rate</div>
          <div class="val"><span class="num">0.42</span><span class="unit">%</span><span class="delta down">↘ 0.08</span></div>
          <svg class="spark tall" viewBox="0 0 120 48" preserveAspectRatio="none">
            <defs>
              <linearGradient id="fill-red" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stop-color="#f87171" stop-opacity="0.30"/>
                <stop offset="100%" stop-color="#f87171" stop-opacity="0"/>
              </linearGradient>
            </defs>
            <path d="M0,12 L10,16 L20,14 L30,20 L40,18 L50,24 L60,22 L70,28 L80,26 L90,30 L100,32 L110,34 L120,36 L120,48 L0,48 Z"
                  fill="url(#fill-red)"/>
            <path d="M0,12 L10,16 L20,14 L30,20 L40,18 L50,24 L60,22 L70,28 L80,26 L90,30 L100,32 L110,34 L120,36"
                  fill="none" stroke="#f87171" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/>
            <circle cx="120" cy="36" r="2.2" fill="#f87171"/>
          </svg>
        </div>

        <div class="tile">
          <div class="label">p99 latency</div>
          <div class="val"><span class="num">142</span><span class="unit">ms</span><span class="delta flat">— 0%</span></div>
          <!-- Bar sparkline. -->
          <svg class="spark tall" viewBox="0 0 120 48" preserveAspectRatio="none">
            <g fill="#38bdf8">
              <rect x="0"   y="20" width="6" height="28" rx="1"/>
              <rect x="8"   y="22" width="6" height="26" rx="1"/>
              <rect x="16"  y="18" width="6" height="30" rx="1"/>
              <rect x="24"  y="26" width="6" height="22" rx="1"/>
              <rect x="32"  y="14" width="6" height="34" rx="1"/>
              <rect x="40"  y="22" width="6" height="26" rx="1"/>
              <rect x="48"  y="18" width="6" height="30" rx="1"/>
              <rect x="56"  y="24" width="6" height="24" rx="1"/>
              <rect x="64"  y="20" width="6" height="28" rx="1"/>
              <rect x="72"  y="16" width="6" height="32" rx="1"/>
              <rect x="80"  y="24" width="6" height="24" rx="1"/>
              <rect x="88"  y="22" width="6" height="26" rx="1"/>
              <rect x="96"  y="18" width="6" height="30" rx="1"/>
              <rect x="104" y="20" width="6" height="28" rx="1"/>
              <rect x="112" y="19" width="6" height="29" rx="1"/>
            </g>
          </svg>
        </div>

      </div>
    </div>

    <!-- Inline variants: sparkline beside a label + number. -->
    <div>
      <div class="caption">Inline — next to a metric</div>
      <div class="row">
        <div class="inline">
          <span class="label">CPU</span>
          <svg class="spark" viewBox="0 0 88 22" preserveAspectRatio="none">
            <path d="M0,16 L8,14 L16,18 L24,12 L32,14 L40,10 L48,12 L56,8 L64,6 L72,10 L80,6 L88,8"
                  fill="none" stroke="#38bdf8" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span class="num">42%</span>
        </div>

        <div class="inline">
          <span class="label">Mem</span>
          <svg class="spark" viewBox="0 0 88 22" preserveAspectRatio="none">
            <path d="M0,14 L8,12 L16,10 L24,10 L32,8 L40,8 L48,6 L56,8 L64,7 L72,6 L80,6 L88,5"
                  fill="none" stroke="#fbbf24" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span class="num">68%</span>
        </div>

        <div class="inline">
          <span class="label">Disk I/O</span>
          <svg class="spark" viewBox="0 0 88 22" preserveAspectRatio="none">
            <path d="M0,10 L8,12 L16,6 L24,14 L32,4 L40,16 L48,8 L56,14 L64,4 L72,12 L80,6 L88,10"
                  fill="none" stroke="#4ade80" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span class="num">212 MB/s</span>
        </div>
      </div>
    </div>

    <!-- Sparkline inside a table row. -->
    <div>
      <div class="caption">Inside a DataTable row</div>
      <div class="panel">
        <table>
          <thead>
            <tr>
              <th>Service</th>
              <th>Region</th>
              <th>Last hour</th>
              <th class="num">p99</th>
              <th class="num">RPS</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td>api-east</td>
              <td>us-east-1</td>
              <td>
                <svg class="spark" viewBox="0 0 140 22" preserveAspectRatio="none">
                  <path d="M0,14 L14,10 L28,12 L42,8 L56,10 L70,6 L84,8 L98,6 L112,5 L126,4 L140,3"
                        fill="none" stroke="#4ade80" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </td>
              <td class="num">118 ms</td>
              <td class="num">2.1k</td>
            </tr>
            <tr>
              <td>api-west</td>
              <td>us-west-2</td>
              <td>
                <svg class="spark" viewBox="0 0 140 22" preserveAspectRatio="none">
                  <path d="M0,6 L14,8 L28,6 L42,10 L56,12 L70,16 L84,14 L98,18 L112,15 L126,19 L140,16"
                        fill="none" stroke="#f87171" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </td>
              <td class="num">284 ms</td>
              <td class="num">840</td>
            </tr>
            <tr>
              <td>api-eu</td>
              <td>eu-west-1</td>
              <td>
                <svg class="spark" viewBox="0 0 140 22" preserveAspectRatio="none">
                  <path d="M0,10 L14,11 L28,9 L42,12 L56,10 L70,11 L84,9 L98,10 L112,11 L126,10 L140,9"
                        fill="none" stroke="#38bdf8" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </td>
              <td class="num">96 ms</td>
              <td class="num">1.5k</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

  </div>
</body>
</html>
