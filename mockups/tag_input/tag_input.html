<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>TagInput (Slate)</title>
  <style>
    html, body { margin: 0; padding: 0; background: #0f172a; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Ubuntu, sans-serif;
      color: #e2e8f0;
    }

    .stack {
      display: flex;
      flex-direction: column;
      gap: 28px;
      width: 520px;
    }

    .field-label {
      font-size: 13px;
      color: #94a3b8;
      margin-bottom: 6px;
      display: block;
    }

    /* The outer frame. Click anywhere in it to focus the inner <input>. */
    .input {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 6px;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 6px;
      padding: 5px 8px;
      min-height: 34px;
      cursor: text;
      transition: border-color 120ms, box-shadow 120ms;
    }
    .input:hover { border-color: #475569; }
    .input.focused {
      border-color: #38bdf8;
      box-shadow: 0 0 0 2px rgba(56, 189, 248, 0.25);
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: rgba(56, 189, 248, 0.16);
      color: #e2e8f0;
      border-radius: 4px;
      padding: 2px 4px 2px 8px;
      font-size: 13px;
      line-height: 1.2;
      font-weight: 500;
      user-select: none;
    }

    /* Visual cue when Backspace-on-empty is about to remove this tag. */
    .pill.armed {
      background: rgba(248, 113, 113, 0.22);
      outline: 1px solid rgba(248, 113, 113, 0.6);
    }

    .pill-x {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 16px;
      height: 16px;
      border-radius: 3px;
      color: #64748b;
      cursor: pointer;
      background: transparent;
      border: none;
      padding: 0;
    }
    .pill-x:hover {
      color: #e2e8f0;
      background: rgba(226, 232, 240, 0.08);
    }

    /* The real text input. Invisible chrome, inherits theme text. */
    .field {
      flex: 1;
      min-width: 80px;
      background: transparent;
      border: none;
      outline: none;
      color: #e2e8f0;
      font: inherit;
      font-size: 14px;
      padding: 2px 4px;
      caret-color: #e2e8f0;
    }
    .field::placeholder { color: #475569; }

    .hint {
      font-size: 12px;
      color: #64748b;
      margin-top: 6px;
    }
    .hint kbd {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 3px;
      padding: 0 5px;
      font-size: 11px;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      color: #e2e8f0;
    }

    .error {
      font-size: 12px;
      color: #f87171;
      margin-top: 6px;
      min-height: 14px;
    }
  </style>
</head>
<body>
  <div class="stack">
    <div data-tag-input data-validator="email">
      <label class="field-label" for="recipients">Recipients</label>
      <div class="input">
        <!-- Pills are appended here by JS. -->
        <input
          class="field"
          id="recipients"
          type="text"
          placeholder="Add an email…"
          autocomplete="off"
          spellcheck="false">
      </div>
      <div class="error" data-error></div>
      <div class="hint">
        Press <kbd>Enter</kbd>, <kbd>,</kbd> or <kbd>Space</kbd> to add ·
        <kbd>⌫</kbd> on empty to remove last · click × to remove
      </div>
    </div>

    <div data-tag-input>
      <label class="field-label" for="tags">Tags</label>
      <div class="input">
        <input
          class="field"
          id="tags"
          type="text"
          placeholder="Add tags…"
          autocomplete="off"
          spellcheck="false">
      </div>
      <div class="hint">
        Press <kbd>Enter</kbd> or <kbd>,</kbd> to add
      </div>
    </div>
  </div>

  <script>
    // Minimal TagInput — one instance per [data-tag-input] root.
    // Public contract for future ports (including the Rust widget):
    //   * adding:  Enter, comma, and (for recipients) space commit the current buffer.
    //   * removing: × on a pill, or Backspace on empty input (with a two-step "arm"
    //     affordance — first backspace highlights the last pill, second removes).
    //   * de-duping: case-insensitive, trimmed; a duplicate flashes the existing pill.
    //   * validation: optional per-root, set via data-validator="email".
    (function () {
      const VALIDATORS = {
        email: (v) => /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v),
      };

      // Seed values for demoing.
      const SEEDS = {
        recipients: ['stephen@example.com', 'team@soul-live.dev', 'oncall@soul-live.dev'],
        tags: [],
      };

      document.querySelectorAll('[data-tag-input]').forEach((root) => {
        const frame = root.querySelector('.input');
        const field = root.querySelector('.field');
        const errorEl = root.querySelector('[data-error]');
        const validator = VALIDATORS[root.dataset.validator];
        const commitOnSpace = root.dataset.validator === 'email';

        let tags = [...(SEEDS[field.id] ?? [])];
        let armed = false; // true when backspace-on-empty has highlighted last pill

        const setError = (msg) => { if (errorEl) errorEl.textContent = msg || ''; };

        const render = () => {
          // Remove any existing pills, then re-insert before the input.
          frame.querySelectorAll('.pill').forEach((n) => n.remove());
          tags.forEach((tag, i) => {
            const pill = document.createElement('span');
            pill.className = 'pill' + (armed && i === tags.length - 1 ? ' armed' : '');
            pill.textContent = tag;

            const x = document.createElement('button');
            x.type = 'button';
            x.className = 'pill-x';
            x.setAttribute('aria-label', `Remove ${tag}`);
            x.innerHTML =
              '<svg width="10" height="10" viewBox="0 0 24 24" fill="none" ' +
              'stroke="currentColor" stroke-width="2.5" stroke-linecap="round">' +
              '<line x1="18" y1="6" x2="6" y2="18"/>' +
              '<line x1="6" y1="6" x2="18" y2="18"/></svg>';
            x.addEventListener('mousedown', (e) => e.preventDefault()); // keep field focus
            x.addEventListener('click', () => { removeAt(i); field.focus(); });

            pill.appendChild(x);
            frame.insertBefore(pill, field);
          });
        };

        const commit = () => {
          const raw = field.value.trim().replace(/,+$/, '').trim();
          if (!raw) return false;
          if (validator && !validator(raw)) {
            setError(`"${raw}" isn't a valid email.`);
            return false;
          }
          // Case-insensitive dedup. Flash the existing pill if the value is a dupe.
          const idx = tags.findIndex((t) => t.toLowerCase() === raw.toLowerCase());
          if (idx >= 0) {
            const existing = frame.querySelectorAll('.pill')[idx];
            if (existing) {
              existing.animate(
                [{ transform: 'translateX(0)' }, { transform: 'translateX(-3px)' },
                 { transform: 'translateX(3px)' }, { transform: 'translateX(0)' }],
                { duration: 180, iterations: 1 },
              );
            }
            field.value = '';
            setError('');
            armed = false;
            return true;
          }
          tags.push(raw);
          field.value = '';
          setError('');
          armed = false;
          render();
          return true;
        };

        const removeAt = (i) => {
          tags.splice(i, 1);
          armed = false;
          setError('');
          render();
        };

        // Click anywhere in the frame focuses the input.
        frame.addEventListener('mousedown', (e) => {
          if (e.target === frame) { field.focus(); }
        });

        field.addEventListener('focus', () => frame.classList.add('focused'));
        field.addEventListener('blur', () => {
          frame.classList.remove('focused');
          armed = false;
          render();
          // Commit any in-progress buffer on blur (nicer for email fields).
          if (field.value.trim()) commit();
        });

        field.addEventListener('keydown', (e) => {
          if (e.key === 'Enter' || e.key === ',' || (commitOnSpace && e.key === ' ' && field.value.trim())) {
            e.preventDefault();
            commit();
            return;
          }
          if (e.key === 'Backspace' && field.value === '' && tags.length > 0) {
            e.preventDefault();
            if (!armed) {
              armed = true;
              render();
            } else {
              removeAt(tags.length - 1);
            }
            return;
          }
          // Any other keystroke disarms.
          if (armed) { armed = false; render(); }
          if (errorEl && errorEl.textContent) setError('');
        });

        // Paste handling: split on commas, semicolons, whitespace.
        field.addEventListener('paste', (e) => {
          const text = (e.clipboardData || window.clipboardData).getData('text');
          if (!text) return;
          if (!/[\s,;]/.test(text)) return; // let single value flow through
          e.preventDefault();
          text.split(/[\s,;]+/).forEach((raw) => {
            const v = raw.trim();
            if (!v) return;
            field.value = v;
            commit();
          });
        });

        render();
      });
    })();
  </script>
</body>
</html>
