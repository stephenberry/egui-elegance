<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Sortable List (Slate)</title>
  <style>
    :root {
      --bg: #0f172a;
      --card: #1e293b;
      --input-bg: #0f172a;
      --border: #334155;
      --text: #e2e8f0;
      --text-muted: #94a3b8;
      --text-faint: #64748b;
      --sky: #38bdf8;
      --success: #4ade80;
      --warning: #fbbf24;
      --danger: #f87171;
    }
    html, body { margin: 0; padding: 0; background: var(--bg); }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Ubuntu, sans-serif;
      color: var(--text);
    }

    .card {
      width: min(520px, 100%);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 18px;
    }
    .card header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 14px;
    }
    .card h2 { font-size: 16px; font-weight: 600; margin: 0; }
    .card .caption { font-size: 12px; color: var(--text-faint); }

    .order {
      margin-top: 12px;
      padding: 8px 10px;
      border: 1px dashed var(--border);
      border-radius: 6px;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 12px;
      color: var(--text-muted);
      white-space: pre-wrap;
    }

    /* List ------------------------------------------------------------- */
    .list {
      position: relative;
      display: flex;
      flex-direction: column;
      gap: 6px;
      user-select: none;
    }

    .row {
      display: grid;
      grid-template-columns: 18px 28px 1fr auto;
      gap: 12px;
      align-items: center;
      padding: 10px 12px;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      transition:
        border-color 0.1s,
        transform 160ms cubic-bezier(0.2, 0.7, 0.25, 1),
        opacity 120ms;
    }
    .row:hover { border-color: var(--text-muted); }
    /* While dragging, the source row is removed from layout so the list
       collapses there and the drop slot elsewhere shows the landing spot. */
    .row.origin-slot { display: none; }

    .grip {
      color: var(--text-faint);
      cursor: grab;
      display: grid;
      place-items: center;
      touch-action: none;
    }
    .grip:active { cursor: grabbing; }
    .row:hover .grip { color: var(--text-muted); }

    .icon-box {
      display: grid;
      place-items: center;
      width: 28px;
      height: 28px;
      border-radius: 6px;
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text-muted);
      font-size: 13px;
    }
    .title { font-size: 14px; color: var(--text); }
    .sub   { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

    /* Pills */
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 3px 9px;
      font-size: 11.5px;
      font-weight: 500;
      border-radius: 999px;
      border: 1px solid transparent;
    }
    .pill::before {
      content: ''; width: 6px; height: 6px; border-radius: 50%; background: currentColor;
    }
    .pill.live { color: var(--success); background: rgba(74,222,128,0.1);  border-color: rgba(74,222,128,0.25); }
    .pill.idle { color: var(--text-muted); background: rgba(148,163,184,0.08); border-color: rgba(148,163,184,0.2); }
    .pill.warn { color: var(--warning); background: rgba(251,191,36,0.1); border-color: rgba(251,191,36,0.25); }
    .pill.down { color: var(--danger);  background: rgba(248,113,113,0.1); border-color: rgba(248,113,113,0.25); }

    /* Ghost row under the pointer ------------------------------------- */
    .ghost {
      position: fixed;
      pointer-events: none;
      z-index: 9;
      background: var(--card);
      border: 1px solid rgba(56, 189, 248, 0.45);
      border-radius: 6px;
      padding: 10px 12px;
      display: grid;
      grid-template-columns: 18px 28px 1fr auto;
      gap: 12px;
      align-items: center;
      box-shadow:
        0 14px 28px rgba(0, 0, 0, 0.55),
        0 2px 0 rgba(56, 189, 248, 0.08) inset;
      transform: rotate(-0.35deg);
    }
    .ghost .grip { color: var(--sky); }

    /* Drop target: a row-height landing slot that opens up in the list so
       the surrounding rows shift to reveal where the held item will land. */
    .drop {
      height: var(--slot-h, 50px);
      border-radius: 6px;
      background: rgba(56, 189, 248, 0.05);
      border: 1px dashed rgba(56, 189, 248, 0.4);
    }
  </style>
</head>
<body>
  <div class="card">
    <header>
      <h2>Deployment targets</h2>
      <span class="caption">drag to reorder · priority top-to-bottom</span>
    </header>
    <div class="list" id="list" role="listbox"></div>
    <div class="order" id="order"></div>
  </div>

<script>
const ITEMS = [
  { id: 'api',    icon: '◔', title: 'api-east-01',    sub: '10.0.1.5 · us-east-1',        status: 'live' },
  { id: 'worker', icon: '◑', title: 'worker-pool-a',  sub: '24 instances · autoscale',    status: 'idle' },
  { id: 'edge',   icon: '◒', title: 'edge-proxy-01',  sub: '8 instances · global',         status: 'warn' },
  { id: 'etl',    icon: '◓', title: 'warehouse-etl',  sub: 'nightly batch · 02:00 UTC',   status: 'down' },
  { id: 'logs',   icon: '◕', title: 'log-ingestor',   sub: '12 instances · kafka',         status: 'live' },
];
const STATUS_LABELS = { live: 'live', idle: 'idle', warn: 'degraded', down: 'offline' };

let items = [...ITEMS];
const list  = document.getElementById('list');
const order = document.getElementById('order');

// Drag state. Null when idle.
let drag = null; // { originIdx, ghost, offsetX, offsetY, targetIdx, pointerId }

function escapeHtml(s) {
  return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function gripSvg() {
  return '<svg width="10" height="16" viewBox="0 0 10 16" fill="currentColor">' +
    '<circle cx="3" cy="3"  r="1.3"/><circle cx="7" cy="3"  r="1.3"/>' +
    '<circle cx="3" cy="8"  r="1.3"/><circle cx="7" cy="8"  r="1.3"/>' +
    '<circle cx="3" cy="13" r="1.3"/><circle cx="7" cy="13" r="1.3"/></svg>';
}

function rowHtml(item) {
  return (
    '<span class="grip" aria-hidden="true">' + gripSvg() + '</span>' +
    '<div class="icon-box">' + item.icon + '</div>' +
    '<div>' +
      '<div class="title">' + escapeHtml(item.title) + '</div>' +
      '<div class="sub">'   + escapeHtml(item.sub)   + '</div>' +
    '</div>' +
    '<span class="pill ' + item.status + '">' + STATUS_LABELS[item.status] + '</span>'
  );
}

function render() {
  const slotStyle = drag ? ' style="--slot-h:' + drag.slotHeight + 'px"' : '';
  let html = '';
  items.forEach((item, i) => {
    if (drag && drag.targetIdx === i) {
      html += '<div class="drop"' + slotStyle + '></div>';
    }
    const cls = 'row' + (drag && drag.originIdx === i ? ' origin-slot' : '');
    html += '<div class="' + cls + '" data-idx="' + i + '" data-id="' + item.id + '">' + rowHtml(item) + '</div>';
  });
  // Trailing drop indicator.
  if (drag && drag.targetIdx === items.length) {
    html += '<div class="drop"' + slotStyle + '></div>';
  }
  list.innerHTML = html;

  // Wire up drag starts on each grip.
  list.querySelectorAll('.row').forEach(row => {
    const grip = row.querySelector('.grip');
    grip.addEventListener('pointerdown', onPointerDown);
  });

  // Update the "current order" summary line.
  order.textContent = items.map((x, i) => (i + 1) + '. ' + x.title).join('\n');
}

function onPointerDown(e) {
  if (e.button !== undefined && e.button !== 0) return;
  e.preventDefault();
  const row = e.currentTarget.closest('.row');
  const idx = +row.dataset.idx;
  const rect = row.getBoundingClientRect();
  const offsetX = e.clientX - rect.left;
  const offsetY = e.clientY - rect.top;

  const ghost = document.createElement('div');
  ghost.className = 'ghost';
  ghost.style.width = rect.width + 'px';
  ghost.innerHTML = rowHtml(items[idx]);
  document.body.appendChild(ghost);

  drag = {
    originIdx: idx,
    ghost, offsetX, offsetY,
    targetIdx: idx,
    slotHeight: rect.height,
    pointerId: e.pointerId,
  };
  moveGhost(e.clientX, e.clientY);

  // Listen on window so events survive the re-render that replaces the grip.
  window.addEventListener('pointermove',   onPointerMove);
  window.addEventListener('pointerup',     onPointerUp);
  window.addEventListener('pointercancel', cancelDrag);
  window.addEventListener('keydown',       onKeyDown);

  render();
}

function onPointerMove(e) {
  if (!drag) return;
  moveGhost(e.clientX, e.clientY);

  // Compute target index by comparing pointer Y against each row midline.
  const rows = [...list.querySelectorAll('.row')];
  const mids = rows.map(r => {
    const b = r.getBoundingClientRect();
    return { idx: +r.dataset.idx, mid: b.top + b.height / 2 };
  });

  let target = items.length;
  for (const m of mids) {
    if (e.clientY < m.mid) { target = m.idx; break; }
  }
  if (target !== drag.targetIdx) {
    drag.targetIdx = target;
    render();
  }
}

function onPointerUp() {
  if (!drag) return;
  const { originIdx, targetIdx, ghost } = drag;

  // Convert visual target to final array index.
  let finalIdx = targetIdx;
  if (finalIdx > originIdx) finalIdx--;

  if (finalIdx !== originIdx) {
    const [moved] = items.splice(originIdx, 1);
    items.splice(finalIdx, 0, moved);
  }

  ghost.remove();
  drag = null;
  unbindDragListeners();
  render();
}

function cancelDrag() {
  if (!drag) return;
  drag.ghost.remove();
  drag = null;
  unbindDragListeners();
  render();
}

function unbindDragListeners() {
  window.removeEventListener('pointermove',   onPointerMove);
  window.removeEventListener('pointerup',     onPointerUp);
  window.removeEventListener('pointercancel', cancelDrag);
  window.removeEventListener('keydown',       onKeyDown);
}

function onKeyDown(e) {
  if (e.key === 'Escape') { e.preventDefault(); cancelDrag(); }
}

function moveGhost(x, y) {
  if (!drag) return;
  drag.ghost.style.left = (x - drag.offsetX) + 'px';
  drag.ghost.style.top  = (y - drag.offsetY) + 'px';
}

render();
</script>
</body>
</html>
