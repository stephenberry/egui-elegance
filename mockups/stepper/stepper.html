<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Stepper (Slate)</title>
  <style>
    html, body { margin: 0; padding: 0; background: #0f172a; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Ubuntu, sans-serif;
      color: #e2e8f0;
    }

    .stack {
      display: flex;
      flex-direction: column;
      gap: 40px;
      width: 720px;
    }

    .caption {
      font-size: 12px;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 16px;
    }

    .stepper {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 0;
    }

    .step {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      flex: 0 0 auto;
      min-width: 88px;
    }

    .bubble {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 600;
      border: 1.5px solid #334155;
      background: #1e293b;
      color: #64748b;
      transition: none;
    }
    .bubble.done {
      background: #38bdf8;
      border-color: #38bdf8;
      color: #0f172a;
    }
    .bubble.current {
      background: #0f172a;
      border-color: #38bdf8;
      color: #38bdf8;
      box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.18);
    }

    .label {
      font-size: 13px;
      color: #64748b;
      text-align: center;
      line-height: 1.3;
    }
    .label.active { color: #e2e8f0; font-weight: 600; }
    .label.done { color: #94a3b8; }

    .sublabel {
      font-size: 12px;
      color: #475569;
      text-align: center;
      margin-top: -2px;
    }

    .connector {
      flex: 1;
      height: 1.5px;
      background: #334155;
      margin-top: 14px;
      min-width: 20px;
    }
    .connector.done {
      background: #38bdf8;
    }
  </style>
</head>
<body>
  <div class="stack">
    <div>
      <div class="caption">Stepper — step 3 of 5</div>
      <div class="stepper" role="list" aria-label="Setup progress">
        <div class="step" role="listitem">
          <div class="bubble done">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="3" stroke-linecap="round"
                 stroke-linejoin="round">
              <polyline points="20 6 9 17 4 12"/>
            </svg>
          </div>
          <div class="label done">Account</div>
        </div>
        <div class="connector done"></div>

        <div class="step" role="listitem">
          <div class="bubble done">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="3" stroke-linecap="round"
                 stroke-linejoin="round">
              <polyline points="20 6 9 17 4 12"/>
            </svg>
          </div>
          <div class="label done">Workspace</div>
        </div>
        <div class="connector done"></div>

        <div class="step" role="listitem" aria-current="step">
          <div class="bubble current">3</div>
          <div class="label active">Billing</div>
          <div class="sublabel">In progress</div>
        </div>
        <div class="connector"></div>

        <div class="step" role="listitem">
          <div class="bubble">4</div>
          <div class="label">Integrations</div>
        </div>
        <div class="connector"></div>

        <div class="step" role="listitem">
          <div class="bubble">5</div>
          <div class="label">Review</div>
        </div>
      </div>
    </div>

    <div>
      <div class="caption">Stepper — step 1 of 3 (no sub-labels)</div>
      <div class="stepper" role="list">
        <div class="step" role="listitem" aria-current="step">
          <div class="bubble current">1</div>
          <div class="label active">Details</div>
        </div>
        <div class="connector"></div>

        <div class="step" role="listitem">
          <div class="bubble">2</div>
          <div class="label">Payment</div>
        </div>
        <div class="connector"></div>

        <div class="step" role="listitem">
          <div class="bubble">3</div>
          <div class="label">Confirm</div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
