<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Tooltip (Slate)</title>
  <style>
    html, body { margin: 0; padding: 0; background: #0f172a; }
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Ubuntu, sans-serif;
      color: #e2e8f0;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(320px, 1fr));
      gap: 64px 48px;
      align-items: end;
      justify-items: center;
    }

    .caption {
      font-size: 12px;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 12px;
      text-align: center;
    }

    .page-hint {
      margin-top: 40px;
      max-width: 560px;
      text-align: center;
      font-size: 12.5px;
      color: #64748b;
      font-style: italic;
      line-height: 1.5;
    }
    .page-hint .kbd {
      font-style: normal;
      vertical-align: 1px;
    }

    /* Trigger button. */
    .trigger {
      position: relative;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: transparent;
      border: 1px solid #475569;
      color: #e2e8f0;
      border-radius: 6px;
      padding: 6.5px 12px;
      font-family: inherit;
      font-size: 13.5px;
      font-weight: 500;
      cursor: pointer;
      transition: border-color 80ms;
    }
    .trigger:hover { border-color: #64748b; }
    .trigger:focus-visible {
      outline: none;
      border-color: #38bdf8;
      box-shadow: 0 0 0 2px rgba(56, 189, 248, 0.18);
    }
    .trigger.icon-only {
      padding: 6px;
      background: rgba(226, 232, 240, 0.06);
    }
    .trigger.icon-only:hover { background: rgba(226, 232, 240, 0.10); }
    .trigger.pill {
      border-radius: 99px;
      padding: 2px 9px;
      font-size: 12px;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      color: #e2e8f0;
      background: rgba(251, 191, 36, 0.14);
      border-color: rgba(251, 191, 36, 0.35);
    }

    /* Tooltip card. */
    .tooltip {
      position: absolute;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 6px;
      padding: 8px 10px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.35);
      z-index: 10;
      pointer-events: none;
      font-size: 13px;
      line-height: 1.35;
      min-width: 180px;
      max-width: 280px;

      opacity: 0;
      visibility: hidden;
      transition: opacity 100ms ease-out, visibility 100ms, transform 100ms ease-out;
    }
    .trigger.open .tooltip {
      opacity: 1;
      visibility: visible;
    }

    .tooltip .heading {
      color: #e2e8f0;
      font-weight: 600;
      font-size: 13px;
      margin-bottom: 2px;
    }
    .tooltip .body {
      color: #94a3b8;
      font-size: 12.5px;
    }

    /* Caret. */
    .tooltip::before {
      content: "";
      position: absolute;
      width: 8px;
      height: 8px;
      background: #1e293b;
      border: 1px solid #334155;
      transform: rotate(45deg);
    }

    /* Placement: above, centered. Transform drives positioning AND fade-direction. */
    .tooltip.above {
      bottom: calc(100% + 10px);
      left: 50%;
      transform: translate(-50%, 3px);
    }
    .trigger.open .tooltip.above { transform: translate(-50%, 0); }
    .tooltip.above::before {
      bottom: -5px;
      left: 50%;
      transform: translateX(-50%) rotate(45deg);
      border-top: none;
      border-left: none;
    }

    /* Placement: below, centered. */
    .tooltip.below {
      top: calc(100% + 10px);
      left: 50%;
      transform: translate(-50%, -3px);
    }
    .trigger.open .tooltip.below { transform: translate(-50%, 0); }
    .tooltip.below::before {
      top: -5px;
      left: 50%;
      transform: translateX(-50%) rotate(45deg);
      border-bottom: none;
      border-right: none;
    }

    /* Shortcut row inside tooltip. */
    .shortcut {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-top: 6px;
      padding-top: 6px;
      border-top: 1px solid #334155;
    }
    .shortcut .label {
      color: #64748b;
      font-size: 11.5px;
    }
    .kbd {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 16px;
      height: 18px;
      padding: 0 5px;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 11px;
      color: #e2e8f0;
      background: #0f172a;
      border: 1px solid #334155;
      border-bottom-width: 2px;
      border-radius: 3px;
      line-height: 1;
    }
    .kbd + .kbd { margin-left: 2px; }

    .tile {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 200px;
      justify-content: flex-end;
    }
  </style>
</head>
<body>
  <div class="grid">

    <!-- Variant 1: label-only, above. -->
    <div class="tile">
      <div class="caption">Label only</div>
      <button class="trigger icon-only" aria-describedby="tip-1" data-tooltip>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round"
             stroke-linejoin="round">
          <path d="M3 12a9 9 0 1 0 18 0 9 9 0 0 0-18 0z"/>
          <path d="M12 8v5"/>
          <circle cx="12" cy="16" r="0.8" fill="currentColor"/>
        </svg>
        <span class="tooltip above" id="tip-1" role="tooltip">
          <span class="body">Copy share link</span>
        </span>
      </button>
    </div>

    <!-- Variant 2: heading + body + shortcut, above. -->
    <div class="tile">
      <div class="caption">Heading + body + shortcut</div>
      <button class="trigger" aria-describedby="tip-2" data-tooltip>
        Save
        <span class="tooltip above" id="tip-2" role="tooltip">
          <span class="heading">Save changes</span>
          <span class="body" style="display:block;">Write the working tree to disk. Remote sync runs in the background.</span>
          <span class="shortcut">
            <span class="label">Shortcut</span>
            <span><span class="kbd">⌘</span><span class="kbd">S</span></span>
          </span>
        </span>
      </button>
    </div>

    <!-- Variant 3: explanation for a status pill, below. -->
    <div class="tile" style="justify-content: flex-start;">
      <div class="caption">Explaining a status pill</div>
      <button class="trigger pill" aria-describedby="tip-3" data-tooltip>
        degraded
        <span class="tooltip below" id="tip-3" role="tooltip">
          <span class="heading">Partial outage</span>
          <span class="body" style="display:block;">api-west-01 is returning elevated 5xx. Other regions healthy. Updated 38s ago.</span>
        </span>
      </button>
    </div>

    <!-- Variant 4: inline "?" help icon next to a label, below. -->
    <div class="tile" style="justify-content: flex-start;">
      <div class="caption">Field help</div>
      <div style="display:flex; align-items:center; gap:6px;">
        <label style="color:#94a3b8; font-size:13px;">Retry budget</label>
        <button class="trigger icon-only" aria-describedby="tip-4" data-tooltip
                style="padding:2px; border:none; background:transparent; color:#64748b;">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round"
               stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <path d="M9.5 9a2.5 2.5 0 1 1 3.5 2.3c-0.9 0.4-1 0.8-1 1.7"/>
            <circle cx="12" cy="17" r="0.8" fill="currentColor"/>
          </svg>
          <span class="tooltip below" id="tip-4" role="tooltip" style="min-width:220px;">
            <span class="heading">Retry budget</span>
            <span class="body" style="display:block;">Maximum retries per minute before the circuit breaker opens and new requests fail fast.</span>
          </span>
        </button>
      </div>
    </div>

  </div>

  <div class="page-hint">
    Hover a trigger to show its tooltip after a short delay. Tab to focus one via keyboard.
    Press <span class="kbd">Esc</span> to dismiss.
  </div>

  <script>
    (function () {
      var SHOW_DELAY = 350;
      var LEAVE_GRACE = 200;
      var triggers = Array.prototype.slice.call(document.querySelectorAll('[data-tooltip]'));

      var openTrigger = null;
      var showTimer = null;
      var hideTimer = null;
      // Once any tooltip has been shown recently, subsequent hovers skip the delay.
      var chained = false;

      function clearShow() { if (showTimer) { clearTimeout(showTimer); showTimer = null; } }
      function clearHide() { if (hideTimer) { clearTimeout(hideTimer); hideTimer = null; } }

      function show(trigger) {
        clearShow();
        if (openTrigger && openTrigger !== trigger) openTrigger.classList.remove('open');
        trigger.classList.add('open');
        openTrigger = trigger;
        chained = true;
      }

      function hide(trigger) {
        if (trigger) trigger.classList.remove('open');
        if (openTrigger === trigger) openTrigger = null;
      }

      function hideAll() {
        clearShow();
        clearHide();
        triggers.forEach(function (t) { t.classList.remove('open'); });
        openTrigger = null;
        chained = false;
      }

      triggers.forEach(function (trigger) {
        trigger.addEventListener('mouseenter', function () {
          clearHide();
          if (chained) {
            show(trigger);
          } else {
            clearShow();
            showTimer = setTimeout(function () { show(trigger); }, SHOW_DELAY);
          }
        });

        trigger.addEventListener('mouseleave', function () {
          clearShow();
          clearHide();
          hideTimer = setTimeout(function () {
            hide(trigger);
            // If nothing else opened in the grace window, drop out of chained mode.
            if (!openTrigger) chained = false;
          }, LEAVE_GRACE);
        });

        // Keyboard focus shows immediately; blur hides immediately.
        trigger.addEventListener('focus', function () {
          clearShow();
          show(trigger);
        });
        trigger.addEventListener('blur', function () {
          hide(trigger);
          chained = false;
        });
      });

      document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape') hideAll();
      });
    })();
  </script>
</body>
</html>
