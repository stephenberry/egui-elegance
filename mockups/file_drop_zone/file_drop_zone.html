<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>File Drop Zone (Slate)</title>
  <style>
    :root {
      --bg: #0f172a;
      --card: #1e293b;
      --input-bg: #0f172a;
      --border: #334155;
      --text: #e2e8f0;
      --text-muted: #94a3b8;
      --text-faint: #64748b;
      --sky: #38bdf8;
    }
    html, body { margin: 0; padding: 0; background: var(--bg); }
    body {
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 56px 48px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Ubuntu, sans-serif;
      color: var(--text);
    }

    .card {
      width: min(560px, 100%);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 18px;
    }
    .card header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 14px;
    }
    .card h2 { font-size: 16px; font-weight: 600; margin: 0; }
    .card .caption { font-size: 12px; color: var(--text-faint); }

    /* Drop zone --------------------------------------------------------- */
    .zone {
      position: relative;
      border: 1.5px dashed var(--border);
      background: rgba(226, 232, 240, 0.015);
      border-radius: 10px;
      padding: 28px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 10px;
      cursor: pointer;
      transition: border-color 120ms, background 120ms;
    }
    .zone:hover       { border-color: var(--text-muted); }
    .zone.dragover    {
      border-color: var(--sky);
      background: rgba(56, 189, 248, 0.08);
      box-shadow: 0 0 0 4px rgba(56, 189, 248, 0.1);
    }
    .zone .cloud {
      width: 44px; height: 44px;
      border-radius: 50%;
      background: var(--input-bg);
      border: 1px solid var(--border);
      display: grid; place-items: center;
      color: var(--text-muted);
      transition: color 120ms, border-color 120ms;
    }
    .zone.dragover .cloud {
      color: var(--sky);
      border-color: rgba(56, 189, 248, 0.45);
      background: rgba(56, 189, 248, 0.1);
    }
    .zone .prompt {
      font-size: 14px;
      color: var(--text);
    }
    .zone .prompt strong { color: var(--sky); }
    .zone.dragover .prompt { color: var(--sky); font-weight: 500; }
    .zone .hint { font-size: 12px; color: var(--text-faint); }

    /* Hide native input */
    input[type=file] { display: none; }
  </style>
</head>
<body>
  <div class="card">
    <header>
      <h2>Upload assets</h2>
      <span class="caption">images · csv · pdf up to 10 MB</span>
    </header>

    <label class="zone" id="zone" tabindex="0">
      <div class="cloud">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round"
             stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="17 8 12 3 7 8"/>
          <line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
      </div>
      <div class="prompt">Drop files here, or <strong>browse</strong></div>
      <div class="hint">up to 10 MB · PNG, JPG, CSV, PDF</div>
      <input type="file" id="picker" multiple>
    </label>
  </div>

<script>
const zone = document.getElementById('zone');

['dragenter','dragover'].forEach(ev => {
  zone.addEventListener(ev, (e) => {
    e.preventDefault();
    zone.classList.add('dragover');
  });
});
['dragleave','drop'].forEach(ev => {
  zone.addEventListener(ev, (e) => {
    e.preventDefault();
    if (ev === 'dragleave' && e.target !== zone) return;
    zone.classList.remove('dragover');
  });
});
</script>
</body>
</html>
