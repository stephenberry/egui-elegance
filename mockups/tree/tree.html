<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Tree (Slate)</title>
  <style>
    html, body { margin: 0; padding: 0; background: #0f172a; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Ubuntu, sans-serif;
      color: #e2e8f0;
    }

    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 10px;
      padding: 10px 6px;
      width: 360px;
    }

    /* A single row. The row wraps: chevron + icon + label (+ right meta). */
    .row {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: 5px;
      font-size: 13.5px;
      color: #e2e8f0;
      cursor: pointer;
      user-select: none;
      line-height: 1.3;
    }
    .row:hover { background: rgba(226, 232, 240, 0.05); }
    .row.selected {
      background: rgba(56, 189, 248, 0.16);
      color: #e2e8f0;
    }
    .row.selected .muted,
    .row.selected .icon { color: #e2e8f0; }

    .chevron {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 14px;
      height: 14px;
      color: #64748b;
      flex: none;
      transition: transform 120ms;
    }
    .chevron.open { transform: rotate(90deg); }
    .chevron.leaf { visibility: hidden; }

    .icon {
      display: inline-flex;
      width: 16px;
      height: 16px;
      color: #94a3b8;
      flex: none;
    }
    .icon.dir { color: #38bdf8; }
    .icon.modified { color: #fbbf24; }

    .label { flex: 1; }
    .label.dim { color: #94a3b8; }

    .muted {
      color: #64748b;
      font-size: 11.5px;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    }

    /* Indentation — each nested level adds 18px. */
    .row.depth-0 { padding-left: 10px; }
    .row.depth-1 { padding-left: 28px; }
    .row.depth-2 { padding-left: 46px; }
    .row.depth-3 { padding-left: 64px; }

    /* Guide lines between siblings to signal hierarchy. */
    .row.depth-1::before,
    .row.depth-2::before,
    .row.depth-3::before {
      content: "";
      position: relative;
      left: 0;
      width: 0;
    }

    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="card" role="tree" aria-label="Files">

    <!-- src/ (open) -->
    <div class="row depth-0" role="treeitem" aria-expanded="true">
      <span class="chevron open">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round"
             stroke-linejoin="round"><polyline points="9 6 15 12 9 18"/></svg>
      </span>
      <span class="icon dir">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round"
             stroke-linejoin="round">
          <path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
        </svg>
      </span>
      <span class="label">src</span>
      <span class="muted">12</span>
    </div>

      <!-- widgets/ (open) -->
      <div class="row depth-1" role="treeitem" aria-expanded="true">
        <span class="chevron open">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round"
               stroke-linejoin="round"><polyline points="9 6 15 12 9 18"/></svg>
        </span>
        <span class="icon dir">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round"
               stroke-linejoin="round">
            <path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
          </svg>
        </span>
        <span class="label">widgets</span>
      </div>

        <div class="row depth-2" role="treeitem">
          <span class="chevron leaf">•</span>
          <span class="icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></svg></span>
          <span class="label">button.rs</span>
        </div>

        <!-- Selected row. -->
        <div class="row depth-2 selected" role="treeitem" aria-selected="true">
          <span class="chevron leaf">•</span>
          <span class="icon modified"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></svg></span>
          <span class="label">callout.rs</span>
          <span class="muted">M</span>
        </div>

        <div class="row depth-2" role="treeitem">
          <span class="chevron leaf">•</span>
          <span class="icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></svg></span>
          <span class="label">card.rs</span>
        </div>

        <div class="row depth-2" role="treeitem">
          <span class="chevron leaf">•</span>
          <span class="icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></svg></span>
          <span class="label">slider.rs</span>
        </div>

      <!-- theme/ (closed) -->
      <div class="row depth-1" role="treeitem" aria-expanded="false">
        <span class="chevron">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round"
               stroke-linejoin="round"><polyline points="9 6 15 12 9 18"/></svg>
        </span>
        <span class="icon dir">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round"
               stroke-linejoin="round">
            <path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
          </svg>
        </span>
        <span class="label">theme</span>
      </div>

      <div class="row depth-1" role="treeitem">
        <span class="chevron leaf">•</span>
        <span class="icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></svg></span>
        <span class="label">lib.rs</span>
      </div>

    <!-- tests/ (open) -->
    <div class="row depth-0" role="treeitem" aria-expanded="true">
      <span class="chevron open">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round"
             stroke-linejoin="round"><polyline points="9 6 15 12 9 18"/></svg>
      </span>
      <span class="icon dir">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round"
             stroke-linejoin="round">
          <path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
        </svg>
      </span>
      <span class="label">tests</span>
    </div>

      <div class="row depth-1" role="treeitem">
        <span class="chevron leaf">•</span>
        <span class="icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></svg></span>
        <span class="label">visual.rs</span>
      </div>

      <div class="row depth-1" role="treeitem">
        <span class="chevron leaf">•</span>
        <span class="icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></svg></span>
        <span class="label">a11y.rs</span>
      </div>

    <!-- README.md (root file) -->
    <div class="row depth-0" role="treeitem">
      <span class="chevron leaf">•</span>
      <span class="icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></svg></span>
      <span class="label">README.md</span>
    </div>

    <!-- Cargo.toml (root file) -->
    <div class="row depth-0" role="treeitem">
      <span class="chevron leaf">•</span>
      <span class="icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></svg></span>
      <span class="label">Cargo.toml</span>
    </div>

  </div>
</body>
</html>
