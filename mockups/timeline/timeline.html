<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Timeline (Slate)</title>
  <style>
    :root {
      --bg: #0f172a;
      --card: #1e293b;
      --input-bg: #0f172a;
      --border: #334155;
      --text: #e2e8f0;
      --text-muted: #94a3b8;
      --text-faint: #64748b;
      --sky: #38bdf8;
      --blue: #2563eb;
      --green: #16a34a;
      --red: #dc2626;
      --purple: #7c3aed;
      --amber: #d97706;
      --success: #4ade80;
      --danger: #f87171;
      --warning: #fbbf24;
    }
    html, body { margin: 0; padding: 0; background: var(--bg); }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Ubuntu, sans-serif;
      color: var(--text);
    }
    .card {
      width: min(900px, 100%);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 18px;
    }
    .card header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 12px;
      gap: 16px;
    }
    .card h2 { font-size: 16px; font-weight: 600; margin: 0; }
    .legend { display: flex; gap: 12px; font-size: 12px; color: var(--text-muted); }
    .legend .dot {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 2px;
      margin-right: 6px;
      vertical-align: middle;
    }

    .hints {
      display: flex;
      gap: 10px;
      margin-top: 10px;
      font-size: 11.5px;
      color: var(--text-faint);
    }
    .kbd {
      display: inline-flex;
      align-items: center;
      padding: 1px 5px;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 10.5px;
      color: var(--text-muted);
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 4px;
    }
    .zoom-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-muted);
      border-radius: 4px;
      padding: 1px 7px;
      font: inherit;
      font-size: 11.5px;
      cursor: pointer;
    }
    .zoom-btn:hover { border-color: var(--text-muted); color: var(--text); }

    /* Canvas ----------------------------------------------------------- */
    .canvas {
      position: relative;
      border: 1px solid var(--border);
      border-radius: 8px;
      background:
        radial-gradient(rgba(226, 232, 240, 0.06) 1px, transparent 1px)
          0 0 / 22px 22px,
        var(--input-bg);
      padding: 22px 18px 18px;
      overflow: hidden;
    }

    .axis {
      position: relative;
      display: grid;
      grid-template-columns: 84px 1fr;
      font-size: 11px;
      color: var(--text-faint);
      padding-bottom: 6px;
      border-bottom: 1px solid rgba(148, 163, 184, 0.12);
      margin-bottom: 10px;
    }
    .axis .ticks {
      position: relative;
      height: 14px;
    }
    .axis .tick {
      position: absolute;
      top: 0;
      transform: translateX(-50%);
      padding-top: 2px;
      letter-spacing: 0.03em;
      white-space: nowrap;
    }
    .axis .tick::before {
      content: '';
      position: absolute;
      top: -4px;
      left: 50%;
      width: 1px;
      height: 4px;
      background: rgba(148, 163, 184, 0.3);
    }

    .lanes {
      position: relative;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .lane {
      display: grid;
      grid-template-columns: 84px 1fr;
      align-items: center;
      height: 34px;
    }
    .lane .label {
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 12px;
      color: var(--text-muted);
      padding-right: 12px;
    }
    .track {
      position: relative;
      height: 100%;
      border-radius: 6px;
      background: rgba(148, 163, 184, 0.04);
      box-shadow: inset 0 0 0 1px rgba(148, 163, 184, 0.06);
      overflow: hidden;
    }
    .track.pan-cursor { cursor: grab; }
    .track.panning    { cursor: grabbing; }

    .event {
      position: absolute;
      top: 5px;
      bottom: 5px;
      display: flex;
      align-items: center;
      padding: 0 10px;
      font-size: 11.5px;
      font-weight: 500;
      color: #fff;
      border-radius: 5px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      box-shadow: 0 1px 0 rgba(255, 255, 255, 0.08) inset,
                  0 2px 6px rgba(0, 0, 0, 0.25);
      cursor: pointer;
      transition: filter 90ms;
    }
    .event:hover { filter: brightness(1.1); }
    .event.ok      { background: var(--green); }
    .event.info    { background: var(--blue); }
    .event.pending { background: rgba(124, 58, 237, 0.9); }
    .event.warn    { background: var(--amber); }
    .event.fail    { background: var(--red); }
    .event.running {
      background: repeating-linear-gradient(
        45deg,
        rgba(56, 189, 248, 0.85) 0 8px,
        rgba(56, 189, 248, 0.6)  8px 16px);
      color: #0f172a;
      font-weight: 600;
    }
    .event.selected {
      outline: 1.5px solid var(--sky);
      outline-offset: 2px;
      box-shadow:
        0 0 0 4px rgba(56, 189, 248, 0.18),
        0 1px 0 rgba(255, 255, 255, 0.08) inset,
        0 2px 6px rgba(0, 0, 0, 0.25);
    }

    /* Now marker */
    .now-wrap {
      position: absolute;
      top: 0; bottom: 0;
      pointer-events: none;
    }
    .now-line {
      position: absolute;
      top: 0; bottom: 0;
      width: 1px;
      border-left: 1px dashed var(--sky);
    }
    .now-label {
      position: absolute;
      top: -14px;
      left: 4px;
      font-size: 10.5px;
      letter-spacing: 0.05em;
      color: var(--sky);
      background: var(--input-bg);
      padding: 0 4px;
    }
    .now-pulse {
      position: absolute;
      top: -3px;
      left: -4px;
      width: 9px; height: 9px;
      border-radius: 50%;
      background: var(--sky);
      animation: now-pulse 1.6s ease-out infinite;
    }
    @keyframes now-pulse {
      0%   { box-shadow: 0 0 0 0  rgba(56, 189, 248, 0.55); }
      100% { box-shadow: 0 0 0 14px rgba(56, 189, 248, 0.00); }
    }

    .guide {
      position: absolute;
      top: 0; bottom: 0;
      width: 1px;
      background: rgba(226, 232, 240, 0.18);
      pointer-events: none;
      display: none;
    }
    .canvas.hovering .guide { display: block; }

    /* Tooltip --------------------------------------------------------- */
    .tooltip {
      position: absolute;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 9px 11px;
      min-width: 180px;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.5);
      color: var(--text);
      font-size: 12px;
      pointer-events: none;
      opacity: 0;
      transform: translateY(2px);
      transition: opacity 90ms, transform 90ms;
      z-index: 5;
    }
    .tooltip.show { opacity: 1; transform: translateY(0); }
    .tooltip .tip-title {
      font-weight: 600;
      margin-bottom: 3px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .tooltip .tip-title .dot {
      width: 8px; height: 8px;
      border-radius: 2px;
    }
    .tooltip .row-line {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      color: var(--text-muted);
    }
    .tooltip .row-line + .row-line { margin-top: 1px; }
    .tooltip .row-line strong { color: var(--text); font-weight: 500; }
  </style>
</head>
<body>
  <div class="card">
    <header>
      <h2>Deploys — last 8h</h2>
      <div class="legend">
        <span><span class="dot" style="background: var(--green)"></span>succeeded</span>
        <span><span class="dot" style="background: var(--amber)"></span>canary</span>
        <span><span class="dot" style="background: var(--red)"></span>failed</span>
        <span><span class="dot" style="background: var(--sky)"></span>running</span>
      </div>
    </header>

    <div class="canvas" id="canvas">
      <div class="axis">
        <div></div>
        <div class="ticks" id="ticks"></div>
      </div>

      <div class="lanes" id="lanes"></div>

      <div class="now-wrap" id="now-wrap" style="display:none">
        <div class="now-line"></div>
        <div class="now-label">now</div>
        <div class="now-pulse"></div>
      </div>

      <div class="guide" id="guide"></div>
      <div class="tooltip" id="tooltip"></div>
    </div>

    <div class="hints">
      <span><span class="kbd">wheel</span> zoom</span>
      <span><span class="kbd">drag</span> pan</span>
      <span><span class="kbd">click</span> select</span>
      <span style="margin-left:auto">
        <button class="zoom-btn" id="reset">reset view</button>
      </span>
    </div>
  </div>

<script>
// Times are minutes since 00:00.
const hm = (h, m) => h * 60 + (m || 0);
const fmt = (t) => {
  const h = Math.floor(((t % 1440) + 1440) % 1440 / 60);
  const m = Math.floor(((t % 60) + 60) % 60);
  return String(h).padStart(2, '0') + ':' + String(m).padStart(2, '0');
};

const LANES = [
  { id: 'api',    label: 'api' },
  { id: 'worker', label: 'worker' },
  { id: 'edge',   label: 'edge' },
];

const EVENTS = [
  { id: 'a1', lane: 'api',    start: hm(8,12),  end: hm(9,4),   status: 'ok',      label: 'v2.14.0' },
  { id: 'a2', lane: 'api',    start: hm(9,48),  end: hm(10,18), status: 'fail',    label: 'v2.14.1' },
  { id: 'a3', lane: 'api',    start: hm(10,36), end: hm(11,44), status: 'ok',      label: 'v2.14.2' },
  { id: 'a4', lane: 'api',    start: hm(12,6),  end: hm(13,24), status: 'ok',      label: 'v2.15.0' },
  { id: 'a5', lane: 'api',    start: hm(14,8),  end: hm(15,52), status: 'running', label: 'v2.15.1' },

  { id: 'w1', lane: 'worker', start: hm(8,20),  end: hm(8,58),  status: 'info',    label: 'migrate' },
  { id: 'w2', lane: 'worker', start: hm(9,18),  end: hm(11,6),  status: 'ok',      label: 'jobs-q3' },
  { id: 'w3', lane: 'worker', start: hm(11,44), end: hm(12,18), status: 'pending', label: 'queued' },
  { id: 'w4', lane: 'worker', start: hm(12,36), end: hm(13,48), status: 'ok',      label: 'jobs-q3.1' },

  { id: 'e1', lane: 'edge',   start: hm(8,48),  end: hm(10,12), status: 'warn',    label: 'canary 20%' },
  { id: 'e2', lane: 'edge',   start: hm(10,36), end: hm(13,0),  status: 'ok',      label: 'ramp 100%' },
  { id: 'e3', lane: 'edge',   start: hm(13,24), end: hm(14,12), status: 'warn',    label: 'canary 20%' },
];

// Extra info shown in tooltip.
const META = {
  a2: { outcome: 'failed',    note: 'db migration lock'   },
  a4: { outcome: 'succeeded', note: '1h 16m'              },
  a5: { outcome: 'running',   note: 'stage 2 of 4'        },
  e1: { outcome: 'canary',    note: '20% of traffic'      },
  w3: { outcome: 'pending',   note: 'waiting on upstream' },
};

// ---- State --------------------------------------------------------------
const DAY_START = 0;
const DAY_END   = 24 * 60;
const MIN_DUR   = 30;
const MAX_DUR   = 24 * 60;
const INITIAL   = { start: hm(8), end: hm(16) };
const NOW       = hm(15, 54);

let view = { ...INITIAL };
let selectedId = null;

// ---- DOM ---------------------------------------------------------------
const canvas  = document.getElementById('canvas');
const ticks   = document.getElementById('ticks');
const lanes   = document.getElementById('lanes');
const nowWrap = document.getElementById('now-wrap');
const guide   = document.getElementById('guide');
const tooltip = document.getElementById('tooltip');
const reset   = document.getElementById('reset');

// Build the lane shells once.
LANES.forEach(l => {
  const row = document.createElement('div');
  row.className = 'lane';
  row.innerHTML = '<span class="label">' + l.label + '</span>' +
                  '<div class="track pan-cursor" data-lane="' + l.id + '"></div>';
  lanes.appendChild(row);
});
const tracks = Object.fromEntries(
  [...lanes.querySelectorAll('.track')].map(t => [t.dataset.lane, t])
);

// ---- Rendering ---------------------------------------------------------
function render() {
  const trackEl = tracks[LANES[0].id];
  const w = trackEl.clientWidth;
  const dur = view.end - view.start;
  const pxPerMin = w / dur;

  // Axis ticks.
  const step = tickStep(dur);
  const first = Math.ceil(view.start / step) * step;
  let html = '';
  for (let t = first; t <= view.end + 0.01; t += step) {
    const x = (t - view.start) * pxPerMin;
    html += '<span class="tick" style="left:' + x.toFixed(1) + 'px">' + fmt(t) + '</span>';
  }
  ticks.innerHTML = html;

  // Events.
  LANES.forEach(l => {
    const trackW = tracks[l.id].clientWidth;
    const ppm = trackW / dur;
    let ehtml = '';
    for (const e of EVENTS) {
      if (e.lane !== l.id) continue;
      if (e.end < view.start || e.start > view.end) continue;
      const x0 = Math.max(0, (e.start - view.start) * ppm);
      const x1 = Math.min(trackW, (e.end - view.start) * ppm);
      const width = Math.max(4, x1 - x0);
      const sel = e.id === selectedId ? ' selected' : '';
      ehtml +=
        '<div class="event ' + e.status + sel + '" ' +
        'style="left:' + x0.toFixed(1) + 'px;width:' + width.toFixed(1) + 'px" ' +
        'data-id="' + e.id + '">' +
        (width > 30 ? e.label : '') +
        '</div>';
    }
    tracks[l.id].innerHTML = ehtml;
  });

  // "Now" marker.
  if (NOW >= view.start && NOW <= view.end) {
    const trackRect = tracks[LANES[0].id].getBoundingClientRect();
    const canvasRect = canvas.getBoundingClientRect();
    const x = (NOW - view.start) * pxPerMin + (trackRect.left - canvasRect.left);
    nowWrap.style.display = 'block';
    nowWrap.style.left = x + 'px';
    nowWrap.style.top  = (trackRect.top - canvasRect.top - 14) + 'px';
    nowWrap.style.bottom = (canvasRect.bottom - trackRect.bottom) + 'px';
  } else {
    nowWrap.style.display = 'none';
  }

  wireEventHandlers();
  if (selectedId) positionTooltipForSelected();
}

// Pick a sensible tick spacing given how many minutes are visible.
function tickStep(dur) {
  if (dur > 16 * 60) return 180;
  if (dur > 8 * 60)  return 60;
  if (dur > 3 * 60)  return 30;
  if (dur > 90)      return 15;
  if (dur > 30)      return 5;
  return 1;
}

// ---- Interaction: hover, click, pan, zoom -----------------------------

function wireEventHandlers() {
  canvas.querySelectorAll('.event').forEach(el => {
    const ev = EVENTS.find(e => e.id === el.dataset.id);
    el.addEventListener('mouseenter', () => showTooltip(ev, el));
    el.addEventListener('mouseleave', () => {
      if (ev.id !== selectedId) hideTooltip();
      else positionTooltipForSelected();
    });
    el.addEventListener('click', (e) => {
      e.stopPropagation();
      selectedId = ev.id;
      render();
    });
  });
}

function showTooltip(ev, el) {
  const meta = META[ev.id] || {};
  const dotColor = statusColor(ev.status);
  tooltip.innerHTML =
    '<div class="tip-title"><span class="dot" style="background:' + dotColor + '"></span>' +
      ev.lane + ' · ' + ev.label + '</div>' +
    '<div class="row-line"><span>started</span><strong>' + fmt(ev.start) + '</strong></div>' +
    '<div class="row-line"><span>ended</span><strong>' + fmt(ev.end) + '</strong></div>' +
    '<div class="row-line"><span>duration</span><strong>' + humanDur(ev.end - ev.start) + '</strong></div>' +
    (meta.outcome ? '<div class="row-line"><span>status</span><strong style="color:' + dotColor + '">' + meta.outcome + '</strong></div>' : '') +
    (meta.note ? '<div class="row-line"><span>note</span><strong>' + meta.note + '</strong></div>' : '');
  const canvasRect = canvas.getBoundingClientRect();
  const elRect = el.getBoundingClientRect();
  const top = elRect.top - canvasRect.top - tooltip.offsetHeight - 10;
  const left = Math.min(
    canvasRect.width - tooltip.offsetWidth - 10,
    Math.max(6, elRect.left - canvasRect.left)
  );
  tooltip.style.left = left + 'px';
  tooltip.style.top  = (top < 4 ? elRect.bottom - canvasRect.top + 10 : top) + 'px';
  tooltip.classList.add('show');
}

function positionTooltipForSelected() {
  if (!selectedId) return;
  const el = canvas.querySelector('.event.selected');
  if (!el) { hideTooltip(); return; }
  const ev = EVENTS.find(e => e.id === selectedId);
  showTooltip(ev, el);
}

function hideTooltip() { tooltip.classList.remove('show'); }

function humanDur(m) {
  if (m < 60) return m + 'm';
  const h = Math.floor(m / 60);
  const rm = m % 60;
  return rm ? h + 'h ' + rm + 'm' : h + 'h';
}

function statusColor(s) {
  switch (s) {
    case 'ok':      return 'var(--success)';
    case 'fail':    return 'var(--danger)';
    case 'warn':    return 'var(--warning)';
    case 'pending': return '#a78bfa';
    case 'info':    return '#93c5fd';
    case 'running': return 'var(--sky)';
    default:        return 'var(--text-muted)';
  }
}

// Hover guide tracks pointer.
canvas.addEventListener('mousemove', (e) => {
  const trackRect = tracks[LANES[0].id].getBoundingClientRect();
  if (e.clientX >= trackRect.left && e.clientX <= trackRect.right) {
    canvas.classList.add('hovering');
    const cr = canvas.getBoundingClientRect();
    guide.style.left = (e.clientX - cr.left) + 'px';
    guide.style.top  = (trackRect.top - cr.top) + 'px';
    guide.style.height = trackRect.height + 'px';
    // Expand guide to cover all lanes.
    const lastRect = tracks[LANES[LANES.length - 1].id].getBoundingClientRect();
    guide.style.height = (lastRect.bottom - trackRect.top) + 'px';
  } else {
    canvas.classList.remove('hovering');
  }
});
canvas.addEventListener('mouseleave', () => canvas.classList.remove('hovering'));

// Click empty area to deselect.
canvas.addEventListener('click', (e) => {
  if (!e.target.closest('.event')) {
    selectedId = null;
    hideTooltip();
    render();
  }
});

// Wheel zoom around the cursor.
canvas.addEventListener('wheel', (e) => {
  const trackRect = tracks[LANES[0].id].getBoundingClientRect();
  if (e.clientX < trackRect.left || e.clientX > trackRect.right) return;
  e.preventDefault();

  const factor = Math.exp(e.deltaY * 0.0015);
  const localX = e.clientX - trackRect.left;
  const ratio = localX / trackRect.width;
  const pointerMin = view.start + ratio * (view.end - view.start);

  let newDur = (view.end - view.start) * factor;
  newDur = Math.max(MIN_DUR, Math.min(MAX_DUR, newDur));
  view.start = pointerMin - ratio * newDur;
  view.end   = view.start + newDur;
  clampView();
  render();
}, { passive: false });

// Drag-to-pan on a track (when not starting on an event).
let pan = null;
lanes.addEventListener('pointerdown', (e) => {
  const track = e.target.closest('.track');
  if (!track) return;
  if (e.target.closest('.event')) return;
  const trackRect = track.getBoundingClientRect();
  pan = {
    startX: e.clientX,
    startView: view.start,
    dur: view.end - view.start,
    pxPerMin: trackRect.width / (view.end - view.start),
    track,
  };
  track.classList.add('panning');
  track.setPointerCapture(e.pointerId);
});
lanes.addEventListener('pointermove', (e) => {
  if (!pan) return;
  const dx = e.clientX - pan.startX;
  const shiftMin = -dx / pan.pxPerMin;
  view.start = pan.startView + shiftMin;
  view.end   = view.start + pan.dur;
  clampView();
  render();
});
function endPan(e) {
  if (!pan) return;
  pan.track.classList.remove('panning');
  try { pan.track.releasePointerCapture(e.pointerId); } catch (_) {}
  pan = null;
}
lanes.addEventListener('pointerup',     endPan);
lanes.addEventListener('pointercancel', endPan);

function clampView() {
  if (view.start < DAY_START) { view.end += DAY_START - view.start; view.start = DAY_START; }
  if (view.end   > DAY_END)   { view.start -= view.end - DAY_END;   view.end   = DAY_END; }
  if (view.end - view.start < MIN_DUR) view.end = view.start + MIN_DUR;
}

reset.addEventListener('click', () => {
  view = { ...INITIAL };
  selectedId = null;
  hideTooltip();
  render();
});

window.addEventListener('resize', render);

// Wait a frame for layout so clientWidth is correct.
requestAnimationFrame(render);
</script>
</body>
</html>
