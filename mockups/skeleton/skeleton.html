<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Skeleton (Slate)</title>
  <style>
    html, body { margin: 0; padding: 0; background: #0f172a; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Ubuntu, sans-serif;
      color: #e2e8f0;
    }

    .grid {
      display: grid;
      grid-template-columns: 360px 360px;
      gap: 24px;
      align-items: start;
    }

    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 10px;
      padding: 18px;
    }

    .caption {
      font-size: 12px;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin: 0 0 12px;
    }

    /* The single design primitive: a muted rounded rect with a gentle pulse. */
    .sk {
      background: #334155;
      border-radius: 4px;
      animation: pulse 1.6s ease-in-out infinite;
    }
    .sk.circle { border-radius: 50%; }

    @keyframes pulse {
      0%, 100% { opacity: 1.0; }
      50%      { opacity: 0.55; }
    }

    .sk.line-sm { height: 10px; }
    .sk.line-md { height: 12px; }
    .sk.line-lg { height: 14px; }

    /* Layout helpers for the mock compositions. */
    .row {
      display: flex;
      gap: 12px;
      align-items: center;
    }
    .stack { display: flex; flex-direction: column; gap: 8px; }
    .stack > .sk { /* default inherits */ }

    .row + .row { margin-top: 14px; }

    .avatar { width: 36px; height: 36px; flex: none; }

    .block-tall { height: 96px; width: 100%; }
  </style>
</head>
<body>
  <div class="grid">
    <!-- Loading list -->
    <div class="card">
      <h3 class="caption">Loading — list</h3>

      <div class="row">
        <div class="sk circle avatar"></div>
        <div class="stack" style="flex:1;">
          <div class="sk line-md" style="width: 60%;"></div>
          <div class="sk line-sm" style="width: 35%;"></div>
        </div>
      </div>
      <div class="row">
        <div class="sk circle avatar"></div>
        <div class="stack" style="flex:1;">
          <div class="sk line-md" style="width: 75%;"></div>
          <div class="sk line-sm" style="width: 50%;"></div>
        </div>
      </div>
      <div class="row">
        <div class="sk circle avatar"></div>
        <div class="stack" style="flex:1;">
          <div class="sk line-md" style="width: 50%;"></div>
          <div class="sk line-sm" style="width: 28%;"></div>
        </div>
      </div>
      <div class="row">
        <div class="sk circle avatar"></div>
        <div class="stack" style="flex:1;">
          <div class="sk line-md" style="width: 65%;"></div>
          <div class="sk line-sm" style="width: 42%;"></div>
        </div>
      </div>
    </div>

    <!-- Loading card -->
    <div class="card">
      <h3 class="caption">Loading — card content</h3>

      <div class="sk block-tall" style="margin-bottom: 14px;"></div>
      <div class="stack">
        <div class="sk line-lg" style="width: 80%;"></div>
        <div class="sk line-md" style="width: 100%;"></div>
        <div class="sk line-md" style="width: 95%;"></div>
        <div class="sk line-md" style="width: 72%;"></div>
      </div>

      <div class="row" style="margin-top: 18px;">
        <div class="sk" style="width: 92px; height: 30px;"></div>
        <div class="sk" style="width: 80px; height: 30px;"></div>
      </div>
    </div>
  </div>
</body>
</html>
